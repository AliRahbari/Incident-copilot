server:
  port: 8585

openai:
  api-key: ${OPENAI_API_KEY}       # set via environment variable
  base-url: https://api.openai.com
  model: gpt-4o
  connect-timeout-seconds: 5
  read-timeout-seconds: 30

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.incident.copilot: DEBUG
