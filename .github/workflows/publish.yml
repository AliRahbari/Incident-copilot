name: Build & Publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target"
        required: true
        default: "github"
        type: choice
        options:
          - github
          - none

permissions:
  contents: read
  packages: write

jobs:

  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build & test
        run: mvn -B -ntp verify

  publish-github-packages:
    name: Publish to GitHub Packages
    needs: build
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.target == 'github')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN
      - name: Deploy to GitHub Packages
        run: mvn -B -ntp -Prelease,github -DskipTests deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Maven Central deployment is intentionally NOT enabled by default.
  # See docs/PUBLISHING.md §3 + §4 for the additional secrets and POM
  # metadata that must be in place before this can run. Once ready, copy
  # the publish-github-packages job, switch -Pgithub to -Pcentral, and
  # import MAVEN_GPG_PRIVATE_KEY + MAVEN_GPG_PASSPHRASE / CENTRAL_TOKEN_*.
